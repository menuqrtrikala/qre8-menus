<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1626">
<link rel="manifest" href="./manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QRe8">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>QRe8 — Διαχείριση Μενού</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f3f8;
    --bg-grad-1: #f6f4fb;
    --bg-grad-2: #eef1f6;
    --paper: #ffffff;
    --ink: #1e2330;
    --ink-soft: #6b7280;
    --brand: #7c5cdb;
    --brand-dk: #6446c4;
    --brand-soft: #f0ebfb;
    --accent: #14b8a6;
    --line: #e6e8ef;
    --green: #2f855a;
    --green-bg: #e6f4ec;
    --red: #d3453f;
    --red-bg: #fdecec;
    --font: "Inter", system-ui, sans-serif;
    --font-display: "Poppins", system-ui, sans-serif;
    --shadow-sm: 0 1px 3px rgba(30,35,48,0.05);
    --shadow-md: 0 6px 20px rgba(30,35,48,0.08);
    --shadow-lg: 0 20px 50px rgba(90,70,180,0.14);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: var(--font);
    background: linear-gradient(160deg, var(--bg-grad-1), var(--bg-grad-2));
    background-attachment: fixed;
    color: var(--ink);
    line-height: 1.5;
    padding-bottom: 40px;
    min-height: 100vh;
  }
  input, button, select, textarea { font-family: inherit; font-size: 16px; }

  /* ---------- LOGIN ---------- */
  #login-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .login-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 22px;
    box-shadow: var(--shadow-lg);
    width: 100%; max-width: 390px;
    padding: 36px 30px 30px;
    position: relative;
    overflow: hidden;
  }
  .login-card::before {
    content: "";
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--brand), var(--accent));
  }
  .login-logo-img {
    display: block;
    width: 190px; max-width: 70%;
    height: auto; margin: 6px auto 22px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-weight: 600; font-size: .88rem;
    margin-bottom: 6px; color: var(--ink);
  }
  .field input, .field textarea, .field select {
    width: 100%; padding: 13px 14px;
    border: 1.5px solid var(--line); border-radius: 12px;
    background: #fcfcfe; transition: border-color .15s, box-shadow .15s, background .15s;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none; border-color: var(--brand); background: #fff;
    box-shadow: 0 0 0 3px rgba(124,92,219,0.14);
  }

  .btn {
    width: 100%; padding: 15px; border: none; border-radius: 12px;
    font-weight: 600; font-size: 1rem; cursor: pointer;
    transition: transform .1s, opacity .15s, box-shadow .2s, background .15s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: linear-gradient(135deg, var(--brand), var(--brand-dk));
    color: #fff; box-shadow: 0 4px 14px rgba(124,92,219,0.32);
  }
  .btn-primary:hover { box-shadow: 0 6px 20px rgba(124,92,219,0.42); }
  .btn:disabled { opacity: .55; cursor: default; box-shadow: none; }

  .msg { margin-top: 14px; padding: 12px 14px; border-radius: 11px; font-size: .9rem; display: none; }
  .msg.show { display: block; }
  .msg.error { background: var(--red-bg); color: var(--red); }
  .msg.ok { background: var(--green-bg); color: var(--green); }

  /* ---------- APP ---------- */
  #app { display: none; }
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(26,22,38,0.92);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #fff;
    padding: 13px 18px;
    padding-top: calc(13px + env(safe-area-inset-top));
    padding-left: calc(18px + env(safe-area-inset-left));
    padding-right: calc(18px + env(safe-area-inset-right));
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 20px rgba(26,22,38,0.25);
  }
  .topbar .logo-mark {
    font-family: var(--font-display); font-weight: 700; font-size: 1.28rem;
    letter-spacing: -0.5px; display: inline-flex; align-items: center;
  }
  .topbar .logo-mark .q { color: #fff; }
  .topbar .logo-mark .eight {
    color: var(--accent);
    background: linear-gradient(135deg, var(--accent), #6ee7d6);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .topbar .store-name {
    font-size: .82rem; color: rgba(255,255,255,0.7);
    padding-left: 12px; margin-left: 4px;
    border-left: 1px solid rgba(255,255,255,0.22); font-weight: 500;
  }
  .topbar .spacer { margin-left: auto; }
  .btn-logout {
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.28);
    color: #fff; padding: 8px 15px; border-radius: 10px;
    font-size: .82rem; font-weight: 600; cursor: pointer;
    transition: background .15s;
  }
  .btn-logout:hover { background: rgba(255,255,255,0.16); }
  .btn-logout:active { transform: scale(0.96); }

  .wrap { max-width: 660px; margin: 0 auto; padding: 22px 16px; }

  .toolbar { display: flex; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .toolbar select {
    flex: 1; min-width: 150px; padding: 12px 14px;
    border: 1.5px solid var(--line); border-radius: 12px;
    background: #fff; font-weight: 500; box-shadow: var(--shadow-sm);
  }
  .toolbar select:focus { outline: none; border-color: var(--brand); }
  .btn-add {
    background: linear-gradient(135deg, var(--brand), var(--brand-dk));
    color: #fff; border: none; padding: 12px 20px; border-radius: 12px;
    font-weight: 600; cursor: pointer; white-space: nowrap;
    box-shadow: 0 4px 14px rgba(124,92,219,0.3);
  }
  .btn-add:active { transform: scale(0.97); }

  .cat-heading {
    font-family: var(--font-display);
    font-size: .78rem; letter-spacing: 1px; text-transform: uppercase;
    color: var(--brand); margin: 26px 4px 12px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .cat-heading::after {
    content: ""; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--brand-soft), transparent);
  }

  .card {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 16px; padding: 16px 17px; margin-bottom: 12px;
    transition: opacity .2s, box-shadow .18s, transform .1s;
    box-shadow: var(--shadow-sm);
  }
  .card:hover { box-shadow: var(--shadow-md); }
  .card.unavailable { opacity: 0.5; }
  .card-top { display: flex; align-items: flex-start; gap: 12px; }
  .card-name { font-weight: 600; font-size: 1.05rem; flex: 1; word-break: break-word; }
  .card-price {
    font-family: var(--font-display); font-weight: 700; font-size: 1.05rem;
    white-space: nowrap; color: var(--ink);
  }
  .card-price .eur { color: var(--brand); font-weight: 600; margin-left: 1px; }
  .card-desc { font-size: .85rem; color: var(--ink-soft); margin-top: 4px; }
  .card-actions { display: flex; gap: 8px; margin-top: 14px; }
  .card-actions button {
    flex: 1; padding: 10px; border-radius: 10px; font-weight: 600;
    font-size: .84rem; cursor: pointer; border: 1.5px solid var(--line);
    background: #fff; color: var(--ink); transition: transform .1s, background .15s, border-color .15s;
  }
  .card-actions button:active { transform: scale(0.97); }
  .card-actions .act-edit { border-color: #d9d2f2; color: var(--brand-dk); background: var(--brand-soft); }
  .card-actions .act-edit:hover { background: #e8e0fa; }
  .card-actions .act-toggle.on { background: var(--green-bg); border-color: #bfe3cd; color: var(--green); }
  .card-actions .act-toggle.off { background: #f1f3f5; border-color: var(--line); color: var(--ink-soft); }
  .card-actions .act-del { color: var(--red); border-color: #f2cdcd; background: #fff; }
  .card-actions .act-del:hover { background: var(--red-bg); }

  .empty {
    text-align: center; padding: 54px 20px; color: var(--ink-soft);
    background: var(--paper); border: 1.5px dashed var(--line);
    border-radius: 16px; margin-top: 8px;
  }

  /* ---------- MODAL ---------- */
  .modal-back {
    position: fixed; inset: 0; background: rgba(26,22,38,0.55);
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    display: none; align-items: flex-end; justify-content: center; z-index: 100;
  }
  .modal-back.show { display: flex; }
  .modal {
    background: var(--paper); width: 100%; max-width: 560px;
    border-radius: 24px 24px 0 0; padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
    max-height: 92vh; overflow-y: auto;
    animation: slideUp .28s cubic-bezier(.2,.9,.2,1);
  }
  @media (min-width: 560px) {
    .modal-back { align-items: center; }
    .modal { border-radius: 22px; max-height: 88vh; box-shadow: var(--shadow-lg); }
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: .6; } to { transform: translateY(0); opacity: 1; } }
  .modal h2 { font-family: var(--font-display); font-size: 1.32rem; margin-bottom: 4px; }
  .modal .modal-sub { font-size: .85rem; color: var(--ink-soft); margin-bottom: 20px; }
  .modal .field label { font-size: .82rem; }
  .modal textarea { resize: vertical; min-height: 58px; }
  .field-row { display: flex; gap: 12px; }
  .field-row .field { flex: 1; }
  .field-hint { font-size: .74rem; color: var(--ink-soft); margin-top: 4px; }
  .modal-buttons { display: flex; gap: 10px; margin-top: 22px; }
  .modal-buttons .btn { width: auto; flex: 1; }
  .btn-ghost { background: #fff; border: 1.5px solid var(--line); color: var(--ink); }
  .btn-ghost:hover { background: #f7f7fb; }

  .section-divider {
    font-family: var(--font-display);
    font-size: .72rem; letter-spacing: 1px; text-transform: uppercase;
    color: var(--brand); margin: 22px 0 12px; padding-bottom: 8px;
    border-bottom: 1.5px solid var(--brand-soft); font-weight: 700;
  }
  .check-row {
    display: flex; align-items: center; gap: 10px;
    padding: 13px 15px; background: var(--brand-soft); border-radius: 12px;
  }
  .check-row input { width: 20px; height: 20px; accent-color: var(--brand); }
  .check-row label { font-weight: 600; font-size: .92rem; cursor: pointer; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(90px);
    background: var(--ink); color: #fff; padding: 13px 24px;
    border-radius: 30px; font-weight: 600; font-size: .9rem;
    box-shadow: 0 10px 30px rgba(26,22,38,0.3); z-index: 200;
    transition: transform .3s cubic-bezier(.2,.9,.2,1); pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .loading-full {
    min-height: 55vh; display: flex; align-items: center;
    justify-content: center; color: var(--ink-soft);
  }
  .spinner {
    width: 34px; height: 34px; border-radius: 50%;
    border: 3px solid var(--brand-soft); border-top-color: var(--brand);
    animation: spin .7s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

      <input type="text" id="username" autocomplete="username" autocapitalize="none" spellcheck="false" placeholder="π.χ. filips">
    </div>
    <div class="field">
      <label for="password">Κωδικός</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" id="btn-login">Σύνδεση</button>
    <div class="msg" id="login-msg"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <div class="topbar">
    <div class="logo-mark"><span class="q">QRe</span><span class="eight">8</span></div>
    <div class="store-name" id="store-name"></div>
    <div class="spacer"></div>
    <button class="btn-logout" id="btn-logout">Έξοδος</button>
  </div>
  <div class="wrap">
    <div class="toolbar">
      <select id="cat-filter">
        <option value="">Όλες οι κατηγορίες</option>
      </select>
      <button class="btn-add" id="btn-new">+ Νέο προϊόν</button>
    </div>
    <div id="list">
      <div class="loading-full"><div><div class="spinner"></div>Φόρτωση…</div></div>
    </div>
  </div>
</div>

<!-- ============ MODAL ============ -->
<div class="modal-back" id="modal-back">
  <div class="modal">
    <h2 id="modal-title">Επεξεργασία προϊόντος</h2>
    <div class="modal-sub" id="modal-sub"></div>

    <div class="field">
      <label>Κατηγορία</label>
      <select id="f-category"></select>
    </div>

    <div class="section-divider">Ελληνικά</div>
    <div class="field">
      <label>Όνομα</label>
      <input type="text" id="f-name_gr" placeholder="π.χ. Espresso">
    </div>
    <div class="field">
      <label>Περιγραφή (προαιρετικό)</label>
      <textarea id="f-desc_gr" placeholder="π.χ. διπλός, βελούδινη γεύση"></textarea>
    </div>

    <div class="section-divider">English (προαιρετικό)</div>
    <div class="field">
      <label>Name</label>
      <input type="text" id="f-name_en" placeholder="e.g. Espresso">
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="f-desc_en" placeholder="e.g. double, velvety"></textarea>
    </div>

    <div class="section-divider">Τιμή & Σειρά</div>
    <div class="field-row">
      <div class="field">
        <label>Τιμή (€)</label>
        <input type="number" id="f-price" step="0.1" min="0" inputmode="decimal" placeholder="π.χ. 3.5">
      </div>
      <div class="field">
        <label>Σειρά</label>
        <input type="number" id="f-sort_order" step="1" inputmode="numeric" placeholder="π.χ. 1">
        <div class="field-hint">Μικρότερο = ψηλότερα</div>
      </div>
    </div>

    <div class="check-row">
      <input type="checkbox" id="f-available">
      <label for="f-available">Διαθέσιμο (εμφανίζεται στο μενού)</label>
    </div>

    <div class="modal-buttons">
      <button class="btn btn-ghost" id="btn-cancel">Άκυρο</button>
      <button class="btn btn-primary" id="btn-save">Αποθήκευση</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://vxtqlifyhybqlzeiwtif.supabase.co";
const SUPABASE_KEY = "sb_publishable_iaVI9DEVUIGN6ZS1rz9BHg_B5KlWDq_";
const EMAIL_DOMAIN = "@qre8.local";

let accessToken = null;
let store = null;
let categories = [];
let products = [];
let editingId = null;

const $ = (id) => document.getElementById(id);

function apiHeaders(auth) {
  return {
    apikey: SUPABASE_KEY,
    Authorization: "Bearer " + (auth || SUPABASE_KEY),
    "Content-Type": "application/json"
  };
}

function showToast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove("show"), 2200);
}

function fmtPrice(n) {
  if (n === null || n === undefined || n === "") return "—";
  let s = Number(n).toFixed(2);
  if (s.endsWith("0")) s = s.slice(0, -1);
  return s;
}

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

async function login() {
  const username = $("username").value.trim().toLowerCase();
  const password = $("password").value;
  const msg = $("login-msg");
  msg.className = "msg";
  if (!username || !password) {
    msg.textContent = "Συμπλήρωσε όνομα χρήστη και κωδικό.";
    msg.classList.add("show", "error");
    return;
  }
  const email = username.includes("@") ? username : username + EMAIL_DOMAIN;
  const btn = $("btn-login");
  btn.disabled = true; btn.textContent = "Σύνδεση…";
  try {
    const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
      method: "POST",
      headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) {
      msg.textContent = "Λάθος όνομα χρήστη ή κωδικός.";
      msg.classList.add("show", "error");
      return;
    }
    accessToken = data.access_token;
    try { sessionStorage.setItem("qre8_token", accessToken); } catch (e) {}
    await startApp();
  } catch (err) {
    msg.textContent = "Πρόβλημα σύνδεσης. Δοκίμασε ξανά.";
    msg.classList.add("show", "error");
  } finally {
    btn.disabled = false; btn.textContent = "Σύνδεση";
  }
}

function logout() {
  accessToken = null; store = null;
  try { sessionStorage.removeItem("qre8_token"); } catch (e) {}
  $("app").style.display = "none";
  $("login-screen").style.display = "flex";
  $("password").value = "";
}

async function loadStore() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/stores?select=*", { headers: apiHeaders(accessToken) });
  const rows = await res.json();
  if (!Array.isArray(rows) || !rows.length) throw new Error("no store for this user");
  return rows[0];
}

async function loadData() {
  const [catRes, prodRes] = await Promise.all([
    fetch(SUPABASE_URL + "/rest/v1/categories?select=*&order=sort_order.asc", { headers: apiHeaders(accessToken) }),
    fetch(SUPABASE_URL + "/rest/v1/products?select=*&order=sort_order.asc", { headers: apiHeaders(accessToken) })
  ]);
  categories = await catRes.json();
  products = await prodRes.json();
}

function catName(id) {
  const c = categories.find((c) => c.id === id);
  return c ? (c.title_gr || c.title_en || id) : id;
}

function renderCatFilter() {
  $("cat-filter").innerHTML = '<option value="">Όλες οι κατηγορίες</option>' +
    categories.map((c) => `<option value="${escapeHtml(c.id)}">${escapeHtml(c.title_gr || c.title_en || c.id)}</option>`).join("");
}

function renderCatSelect() {
  $("f-category").innerHTML = categories.map((c) =>
    `<option value="${escapeHtml(c.id)}">${escapeHtml(c.title_gr || c.title_en || c.id)}</option>`).join("");
}

function renderList() {
  const filter = $("cat-filter").value;
  const list = $("list");
  const shown = products.filter((p) => !filter || p.category_id === filter);
  if (!shown.length) {
    list.innerHTML = '<div class="empty">Δεν υπάρχουν προϊόντα εδώ ακόμη.<br>Πάτησε «+ Νέο προϊόν» για να ξεκινήσεις.</div>';
    return;
  }
  let html = "";
  const groups = {};
  for (const p of shown) (groups[p.category_id] = groups[p.category_id] || []).push(p);
  const orderedCatIds = categories.map((c) => c.id).filter((id) => groups[id]);
  for (const cid of Object.keys(groups)) if (!orderedCatIds.includes(cid)) orderedCatIds.push(cid);
  for (const cid of orderedCatIds) {
    if (!filter) html += `<div class="cat-heading">${escapeHtml(catName(cid))}</div>`;
    for (const p of groups[cid]) {
      const name = p.name_gr || p.label_gr || p.name_en || p.label_en || "(χωρίς όνομα)";
      const desc = p.desc_gr || p.desc_en || "";
      const avail = p.available !== false;
      html += `
        <div class="card ${avail ? "" : "unavailable"}">
          <div class="card-top">
            <div>
              <div class="card-name">${escapeHtml(name)}</div>
              ${desc ? `<div class="card-desc">${escapeHtml(desc)}</div>` : ""}
            </div>
            <div class="card-price">${fmtPrice(p.price)}<span class="eur">€</span></div>
          </div>
          <div class="card-actions">
            <button class="act-edit" data-edit="${escapeHtml(p.id)}">Επεξεργασία</button>
            <button class="act-toggle ${avail ? "on" : "off"}" data-toggle="${escapeHtml(p.id)}">${avail ? "Διαθέσιμο" : "Κρυμμένο"}</button>
            <button class="act-del" data-del="${escapeHtml(p.id)}">Διαγραφή</button>
          </div>
        </div>`;
    }
  }
  list.innerHTML = html;
}

async function toggleAvailable(id) {
  const p = products.find((x) => x.id === id);
  if (!p) return;
  const newVal = !(p.available !== false);
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/products?id=eq." + id, {
      method: "PATCH", headers: apiHeaders(accessToken),
      body: JSON.stringify({ available: newVal })
    });
    if (!res.ok) throw new Error(await res.text());
    p.available = newVal;
    renderList();
    showToast(newVal ? "Εμφανίζεται στο μενού" : "Κρύφτηκε από το μενού");
  } catch (err) { showToast("Κάτι πήγε στραβά"); console.error(err); }
}

async function deleteProduct(id) {
  const p = products.find((x) => x.id === id);
  const name = p ? (p.name_gr || p.name_en || "αυτό το προϊόν") : "αυτό το προϊόν";
  if (!confirm("Διαγραφή «" + name + "»;\nΗ ενέργεια δεν αναιρείται.")) return;
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/products?id=eq." + id, {
      method: "DELETE", headers: apiHeaders(accessToken)
    });
    if (!res.ok) throw new Error(await res.text());
    products = products.filter((x) => x.id !== id);
    renderList();
    showToast("Διαγράφηκε");
  } catch (err) { showToast("Κάτι πήγε στραβά"); console.error(err); }
}

function openModal(id) {
  editingId = id;
  const isNew = !id;
  $("modal-title").textContent = isNew ? "Νέο προϊόν" : "Επεξεργασία προϊόντος";
  renderCatSelect();
  if (isNew) {
    $("modal-sub").textContent = "";
    $("f-category").value = $("cat-filter").value || (categories[0] && categories[0].id) || "";
    $("f-name_gr").value = ""; $("f-desc_gr").value = "";
    $("f-name_en").value = ""; $("f-desc_en").value = "";
    $("f-price").value = ""; $("f-sort_order").value = "";
    $("f-available").checked = true;
  } else {
    const p = products.find((x) => x.id === id);
    if (!p) return;
    $("modal-sub").textContent = p.name_gr || p.name_en || "";
    $("f-category").value = p.category_id || "";
    $("f-name_gr").value = p.name_gr || ""; $("f-desc_gr").value = p.desc_gr || "";
    $("f-name_en").value = p.name_en || ""; $("f-desc_en").value = p.desc_en || "";
    $("f-price").value = p.price != null ? p.price : "";
    $("f-sort_order").value = p.sort_order != null ? p.sort_order : "";
    $("f-available").checked = p.available !== false;
  }
  $("modal-back").classList.add("show");
}

function closeModal() {
  $("modal-back").classList.remove("show");
  editingId = null;
}

async function saveProduct() {
  const body = {
    category_id: $("f-category").value,
    name_gr: $("f-name_gr").value.trim() || null,
    desc_gr: $("f-desc_gr").value.trim() || null,
    name_en: $("f-name_en").value.trim() || null,
    desc_en: $("f-desc_en").value.trim() || null,
    price: $("f-price").value === "" ? null : Number($("f-price").value),
    sort_order: $("f-sort_order").value === "" ? null : Number($("f-sort_order").value),
    available: $("f-available").checked
  };
  if (!body.name_gr && !body.name_en) { showToast("Βάλε τουλάχιστον ένα όνομα"); return; }
  if (!editingId && store) body.store_id = store.id;
  const btn = $("btn-save");
  btn.disabled = true; btn.textContent = "Αποθήκευση…";
  try {
    let res;
    if (editingId) {
      res = await fetch(SUPABASE_URL + "/rest/v1/products?id=eq." + editingId, {
        method: "PATCH",
        headers: { ...apiHeaders(accessToken), Prefer: "return=representation" },
        body: JSON.stringify(body)
      });
    } else {
      res = await fetch(SUPABASE_URL + "/rest/v1/products", {
        method: "POST",
        headers: { ...apiHeaders(accessToken), Prefer: "return=representation" },
        body: JSON.stringify(body)
      });
    }
    if (!res.ok) throw new Error(await res.text());
    const rows = await res.json();
    const saved = Array.isArray(rows) ? rows[0] : rows;
    if (editingId) {
      const i = products.findIndex((x) => x.id === editingId);
      if (i >= 0) products[i] = saved;
    } else {
      products.push(saved);
    }
    products.sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));
    closeModal();
    renderList();
    showToast("Αποθηκεύτηκε");
  } catch (err) {
    showToast("Η αποθήκευση απέτυχε");
    console.error(err);
  } finally {
    btn.disabled = false; btn.textContent = "Αποθήκευση";
  }
}

async function startApp() {
  $("login-screen").style.display = "none";
  $("app").style.display = "block";
  $("list").innerHTML = '<div class="loading-full"><div><div class="spinner"></div>Φόρτωση…</div></div>';
  try {
    store = await loadStore();
    $("store-name").textContent = store.name || "";
    await loadData();
    renderCatFilter();
    renderList();
  } catch (err) {
    console.error(err);
    $("list").innerHTML = '<div class="empty">Δεν ήταν δυνατή η φόρτωση.<br>Δοκίμασε έξοδο και ξανά σύνδεση.</div>';
  }
}

function bind() {
  $("btn-login").addEventListener("click", login);
  $("password").addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
  $("username").addEventListener("keydown", (e) => { if (e.key === "Enter") $("password").focus(); });
  $("btn-logout").addEventListener("click", logout);
  $("cat-filter").addEventListener("change", renderList);
  $("btn-new").addEventListener("click", () => openModal(null));
  $("btn-cancel").addEventListener("click", closeModal);
  $("btn-save").addEventListener("click", saveProduct);
  $("modal-back").addEventListener("click", (e) => { if (e.target === $("modal-back")) closeModal(); });
  $("list").addEventListener("click", (e) => {
    const ed = e.target.closest("[data-edit]");
    const tg = e.target.closest("[data-toggle]");
    const dl = e.target.closest("[data-del]");
    if (ed) openModal(ed.dataset.edit);
    else if (tg) toggleAvailable(tg.dataset.toggle);
    else if (dl) deleteProduct(dl.dataset.del);
  });
}

(function init() {
  bind();
  let saved = null;
  try { saved = sessionStorage.getItem("qre8_token"); } catch (e) {}
  if (saved) { accessToken = saved; startApp(); }
})();
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").catch(function (e) {
      console.log("SW registration skipped:", e);
    });
  });
}
</script>
</body>
</html>
